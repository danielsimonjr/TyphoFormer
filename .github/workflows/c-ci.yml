name: typhoformer-c CI

on:
  push:
    paths:
      - 'typhoformer-c/**'
      - '.github/workflows/c-ci.yml'
  pull_request:
    paths:
      - 'typhoformer-c/**'
      - '.github/workflows/c-ci.yml'

jobs:
  # Build + unit tests under both gcc and clang.
  build-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        cc: [gcc, clang]
    defaults:
      run:
        working-directory: typhoformer-c
    steps:
      - uses: actions/checkout@v4

      - name: Build (portable -O3)
        run: make CC=${{ matrix.cc }}

      - name: Unit tests (gradient checks, golden, module, parallel, checkpoint, npy)
        run: make CC=${{ matrix.cc }} test

      - name: Sanitizer tests (AddressSanitizer + UBSan)
        run: make CC=${{ matrix.cc }} test-san

      - name: Smoke test (train serial + multicore, eval, prepare, predict, baseline, bench)
        run: |
          # `test-san` above leaves ASan/UBSan-instrumented .o files behind (it does
          # `make clean && make SAN=1 test`). Without a clean here, make sees those
          # objects as up to date and merely RELINKS them -- without -fsanitize -- so
          # the link dies on undefined __asan_* / __ubsan_* symbols. This is why
          # build-test had been red on main since 2026-07-12.
          make clean
          make CC=${{ matrix.cc }}
          ./typhoformer 1 --save=/tmp/m.ckpt
          ./typhoformer 1 --threads=4 --save=/tmp/mp.ckpt
          ./typhoformer eval --weights=/tmp/m.ckpt
          ./typhoformer prepare --out=/tmp/data.tfb
          ./typhoformer predict --weights=/tmp/m.ckpt --n=5 --out=/tmp/pred.csv
          ./typhoformer baseline --pred_len=4
          ./typhoformer bench --iters=20

  # Memory-safety pass under valgrind (gcc build).
  valgrind:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: typhoformer-c
    steps:
      - uses: actions/checkout@v4
      - name: Install valgrind
        run: sudo apt-get update && sudo apt-get install -y valgrind
      - name: Run tests under valgrind
        run: make test-valgrind

  # OpenCL backend: run the model through OpenCL on a CPU device (POCL).
  opencl:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: typhoformer-c
    steps:
      - uses: actions/checkout@v4
      - name: Install POCL (CPU OpenCL) + headers
        run: sudo apt-get update && sudo apt-get install -y pocl-opencl-icd ocl-icd-opencl-dev opencl-headers clinfo
      - name: Show OpenCL device
        run: clinfo -l || true
      - name: Verify OpenCL backend (kernel cross-check + full-model gradient check)
        run: make OPENCL=1 test-opencl

  # CUDA backend: compile-only with nvcc (no GPU on CI runners, so it cannot run).
  cuda-compile:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: typhoformer-c/backends/cuda
    steps:
      - uses: actions/checkout@v4
      - name: Install CUDA toolkit (nvcc)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends nvidia-cuda-toolkit
      - name: Compile the CUDA backend
        run: make        # produces libtyphoformer_cuda.a; execution needs an NVIDIA GPU
