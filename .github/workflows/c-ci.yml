name: typhoformer-c CI

on:
  push:
    paths:
      - 'typhoformer-c/**'
      - '.github/workflows/c-ci.yml'
  pull_request:
    paths:
      - 'typhoformer-c/**'
      - '.github/workflows/c-ci.yml'

jobs:
  # Build + unit tests under both gcc and clang.
  build-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        cc: [gcc, clang]
    defaults:
      run:
        working-directory: typhoformer-c
    steps:
      - uses: actions/checkout@v4

      - name: Build (portable -O3)
        run: make CC=${{ matrix.cc }}

      - name: Unit tests (gradient checks, golden, module, parallel, checkpoint, npy)
        run: make CC=${{ matrix.cc }} test

      - name: Sanitizer tests (AddressSanitizer + UBSan)
        run: make CC=${{ matrix.cc }} test-san

      - name: Smoke test (train serial + multicore, eval, prepare, predict, baseline, bench)
        run: |
          make CC=${{ matrix.cc }}
          ./typhoformer 1 --save=/tmp/m.ckpt
          ./typhoformer 1 --threads=4 --save=/tmp/mp.ckpt
          ./typhoformer eval --weights=/tmp/m.ckpt
          ./typhoformer prepare --out=/tmp/data.tfb
          ./typhoformer predict --weights=/tmp/m.ckpt --n=5 --out=/tmp/pred.csv
          ./typhoformer baseline --pred_len=4
          ./typhoformer bench --iters=20

  # Memory-safety pass under valgrind (gcc build).
  valgrind:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: typhoformer-c
    steps:
      - uses: actions/checkout@v4
      - name: Install valgrind
        run: sudo apt-get update && sudo apt-get install -y valgrind
      - name: Run tests under valgrind
        run: make test-valgrind
